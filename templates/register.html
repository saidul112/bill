{% extends "base.html" %}

{% block title %}Register - Bill Splitter{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>💰 Bill Splitter</h1>
        <p class="subtitle">Create your account</p>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="input-group">
                <label>Username (lowercase only)</label>
                <input type="text" name="username" required autofocus style="text-transform: lowercase;">
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required style="text-transform: lowercase;">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </div>
    </div>
</div>
{% endblock %}
